<style>
:root{
  --bg:#0b0e13; --panel:#141b25; --panel-2:#1b2430; --line:rgba(255,255,255,0.08);
  --line-2:rgba(255,255,255,0.16); --text:#e7eef7; --muted:#8a99ab; --faint:#5d6b7d;
  --accent:#e8865f; --accent-2:#b4502e; --good:#5ad1a0; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; overscroll-behavior:none; }
body{ background:radial-gradient(1200px 700px at 50% -10%, #16202d 0%, var(--bg) 60%); color:var(--text);
  font-family:'Work Sans',system-ui,sans-serif; min-height:100dvh; -webkit-font-smoothing:antialiased; touch-action:manipulation; }
body.pseudo-fs{ position:fixed; inset:0; width:100vw; height:100dvh; z-index:9999; overflow:auto; }
a{ color:inherit; text-decoration:none; }

/* top bar */
.topbar{ display:flex; align-items:center; gap:12px; padding:8px 14px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,14,19,0.85); backdrop-filter:blur(8px); z-index:20; }
.topbar .back{ font-size:13.5px; color:var(--muted); font-weight:600; }
.topbar .back:hover{ color:var(--text); }
.topbar .title{ font-family:'Fraunces',serif; font-weight:600; font-size:17px; }
.topbar .title b{ color:var(--accent); }
.topbar .grow{ flex:1; }
.fs-btn{ display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; padding:0; border:1px solid var(--line-2); border-radius:10px; background:var(--panel); color:var(--muted); cursor:pointer; }
.fs-btn:hover{ color:var(--text); border-color:var(--accent); }
.fs-btn svg{ width:17px; height:17px; }
.fs-btn .fs-exit{ display:none; }
body.is-fs .fs-btn .fs-enter{ display:none; }
body.is-fs .fs-btn .fs-exit{ display:inline-flex; }

.wrap{ max-width:1040px; margin:0 auto; padding:12px 12px 32px; }

/* two-column cookie-clicker layout */
.cc{ display:grid; gap:14px; align-items:start;
  grid-template-columns:minmax(200px,0.82fr) minmax(250px,1.25fr) minmax(280px,1.05fr);
  grid-template-areas:"clicker factory store" "save factory store"; }
.cc-clicker{ grid-area:clicker; display:flex; flex-direction:column; align-items:center; gap:12px; }
.cc-store{ grid-area:store; }
.cc-save{ grid-area:save; }
/* middle column: your physical buildings, drawn as little vector chips */
.cc-factory{ grid-area:factory; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.fac-band{ border-bottom:1px solid var(--line); padding-bottom:9px; }
.fac-band:last-child{ border-bottom:none; padding-bottom:0; }
.fac-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
.fac-name{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; }
.fac-amt{ font-family:var(--mono); font-weight:700; color:var(--accent); font-size:14px; }
.fac-icons{ display:flex; flex-wrap:wrap; gap:3px; align-items:center; min-height:20px; }
.ficon{ width:18px; height:18px; color:var(--accent); flex:0 0 auto; }
.fac-more{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:4px; align-self:center; }
.fac-empty{ font-size:11.5px; color:var(--faint); }

/* core counter + per-second on the same line, above the click target */
.counter{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; text-align:center; width:100%; min-height:96px; height:96px; overflow:hidden; }
.count-big{ display:block; font-family:'Fraunces',serif; font-weight:600; font-size:clamp(26px,5.5vw,40px); line-height:1.1; color:var(--accent); white-space:nowrap; font-variant-numeric:tabular-nums; }
.count-lbl{ font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-top:-2px; }
.count-cps{ font-size:14px; color:var(--muted); white-space:nowrap; margin-top:3px; }
.count-cps b{ font-family:var(--mono); color:var(--text); font-weight:700; font-variant-numeric:tabular-nums; }

/* glassy square click target */
.gen-wrap{ position:relative; display:flex; justify-content:center; }
.glass{ width:clamp(132px,38vw,250px); aspect-ratio:1/1; border:1px solid rgba(255,255,255,0.18); border-radius:26px; cursor:pointer;
  background:linear-gradient(150deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 42%, rgba(232,134,95,0.14));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.28), inset 0 -26px 50px rgba(0,0,0,0.30), 0 16px 40px rgba(0,0,0,0.45);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  position:relative; overflow:hidden; transition:transform .06s ease; user-select:none; -webkit-user-select:none;
  display:flex; align-items:center; justify-content:center; }
.glass::before{ content:''; position:absolute; inset:0; border-radius:26px; pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,0.30), rgba(255,255,255,0.04) 45%, transparent 60%); }
.glass::after{ content:''; position:absolute; left:50%; top:54%; width:62%; height:62%; transform:translate(-50%,-50%);
  border-radius:50%; pointer-events:none; background:radial-gradient(circle, rgba(232,134,95,0.28), transparent 68%); }
.glass:active{ transform:scale(0.97); }
.glass.pulse{ animation:pulse .18s ease; }
@keyframes pulse{ 0%{ transform:scale(1);} 40%{ transform:scale(1.05);} 100%{ transform:scale(1);} }
.glass-inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.glass-glyph{ font-size:clamp(34px,9vw,58px); color:rgba(255,255,255,0.92); text-shadow:0 0 18px rgba(232,134,95,0.6); line-height:1; }
.glass-lbl{ font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(255,255,255,0.66); font-weight:600; }
.per{ font-family:var(--mono); color:var(--accent); font-size:13px; font-weight:700; }
.floaty{ position:absolute; left:50%; top:24%; transform:translateX(-50%); font-family:var(--mono); font-weight:700; color:var(--accent); pointer-events:none; animation:floatUp 1s ease forwards; z-index:5; }
@keyframes floatUp{ from{ opacity:1; transform:translate(-50%,0);} to{ opacity:0; transform:translate(-50%,-58px);} }

/* compact secondary stats strip */
.ministats{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; font-size:11.5px; color:var(--muted); }
.ministats div span{ text-transform:uppercase; letter-spacing:0.08em; font-size:10px; color:var(--faint); }
.ministats div b{ font-family:var(--mono); color:var(--text); margin-left:5px; font-weight:700; }

/* welcome + toast */
/* offline "welcome back" message — floating toast, does NOT take layout space */
.welcome{ position:fixed; top:54px; left:50%; transform:translateX(-50%); width:min(440px,92vw); z-index:140;
  background:linear-gradient(90deg, rgba(232,134,95,0.24), rgba(232,134,95,0.10)); border:1px solid rgba(232,134,95,0.5);
  border-radius:12px; padding:11px 16px; font-size:13.5px; box-shadow:0 16px 44px rgba(0,0,0,0.5); cursor:pointer; }
.welcome[hidden]{ display:none; }
.toast{ position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(18px); background:var(--panel-2); border:1px solid var(--line-2); color:var(--text); padding:9px 18px; border-radius:999px; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:50; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* building store — compact rows, all 5 visible without scrolling */
.buildings{ display:flex; flex-direction:column; gap:7px; }
.srow{ display:flex; gap:7px; align-items:stretch; }
.srow-buy{ flex:1 1 auto; min-width:0; display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px; text-align:left;
  background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 14px; cursor:pointer; color:var(--text); font-family:inherit; min-height:58px; transition:background .12s ease, border-color .12s ease; }
.srow-buy:hover:not(:disabled){ border-color:var(--accent); background:var(--panel-2); }
.srow-buy:disabled{ opacity:0.42; cursor:not-allowed; }
.srow-info{ display:flex; flex-direction:column; gap:1px; min-width:0; }
.srow-name{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; line-height:1.1; }
.srow-tech{ font-size:11px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:48vw; }
.srow-meta{ font-size:11.5px; color:var(--muted); }
.srow-meta .c{ font-family:var(--mono); color:var(--text); font-weight:700; }
.srow-owned{ justify-self:end; text-align:right; font-family:var(--mono); font-size:22px; font-weight:700; color:var(--text); line-height:1; }
.srow-up{ flex:0 0 auto; width:82px; background:transparent; border:1px solid var(--line-2); border-radius:12px; color:var(--text); font-family:inherit; font-weight:600; font-size:11px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:4px; transition:background .12s ease, border-color .12s ease; }
.srow-up:hover:not(:disabled){ border-color:var(--accent); background:var(--panel-2); }
.srow-up:disabled{ opacity:0.42; cursor:not-allowed; }
.srow-up .c{ font-family:var(--mono); color:var(--accent); }
.srow-upname{ display:none; } /* long next-tech name hidden to keep rows compact */

/* save toolbar */
.cc-save h2{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; margin:0; color:var(--muted); }
.cc-save-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cc-save-close{ display:none; border:1px solid var(--line-2); background:var(--panel-2); color:var(--text); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:14px; line-height:1; }
.save-toggle{ display:none; } /* header trigger for the save popover — mobile only */
.save-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:120; }
.save-backdrop[hidden]{ display:none; }
.cc-tools{ display:flex; flex-wrap:wrap; gap:6px; }
.tbtn{ border:1px solid var(--line-2); background:var(--panel); color:var(--text); border-radius:9px; padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.tbtn:hover{ border-color:var(--accent); }
.tbtn.danger{ border-color:rgba(232,90,80,0.5); color:#f0a59c; }
.tbtn.danger:hover{ background:rgba(232,90,80,0.12); }
#save-box{ width:100%; min-height:46px; margin-top:8px; resize:vertical; background:#0d141d; border:1px solid var(--line-2); border-radius:9px; color:var(--text); font-family:var(--mono); font-size:11px; padding:8px; }
.save-hint{ color:var(--faint); font-size:11px; margin-top:5px; }

/* mobile (≤760px): HARD-LOCKED to one screen. Vertical order = header, clicker (FLEXIBLE),
   store (FIXED — all 5 rows). The glass gives up space first; the building rows are fixed
   and can never be pushed off-screen. The save panel is a popover (⚙ in the header). */
@media (max-width:760px){
  html,body{ height:100dvh; overflow:hidden; }
  body{ display:flex; flex-direction:column; }
  .topbar{ flex:0 0 auto; }
  .save-toggle{ display:inline-flex; }
  .wrap{ flex:1 1 auto; min-height:0; display:flex; padding:6px 10px 8px; }
  .cc{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; gap:8px;
       grid-template-columns:none; grid-template-areas:none; }
  .cc-factory{ display:none; } /* middle building view is desktop-only */

  /* CLICKER = flexible: counter pinned at the top, the glass shrinks to fill leftover */
  .cc-clicker{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .counter{ flex:0 0 auto; gap:2px; min-height:0; height:auto; }
  .count-big{ font-size:clamp(24px,6.2vw,32px); }
  .count-lbl{ font-size:9.5px; }
  .count-cps{ font-size:12px; margin-top:1px; }
  .gen-wrap{ flex:1 1 auto; min-height:0; width:100%; display:flex; align-items:center; justify-content:center; }
  .glass{ height:min(100%,150px); width:auto; max-width:74vw; aspect-ratio:1/1; border-radius:18px; }
  .glass-glyph{ font-size:clamp(22px,6vw,38px); }
  .glass-lbl{ font-size:9px; letter-spacing:0.12em; }
  .per{ font-size:11px; }
  .ministats{ flex:0 0 auto; gap:12px; font-size:10px; flex-wrap:nowrap; }
  .ministats div:last-child{ display:none; } /* drop 'Saved' to keep one tidy line */

  /* STORE = fixed: always shows all five uniform rows */
  .cc-store{ flex:0 0 auto; }
  .buildings{ gap:5px; }
  .srow{ height:46px; }
  .srow-buy{ min-height:0; height:100%; padding:4px 11px; }
  .srow-name{ font-size:14px; }
  .srow-tech{ font-size:9.5px; max-width:46vw; }
  .srow-meta{ font-size:9.5px; }
  .srow-owned{ font-size:18px; }
  .srow-up{ width:66px; font-size:9.5px; padding:3px; }

  /* SAVE panel = popover overlay (opened by the header ⚙), out of layout flow */
  .cc-save{ position:fixed; left:10px; right:10px; bottom:10px; z-index:130; margin:0;
    background:var(--panel); border:1px solid var(--line-2); border-radius:14px; padding:14px;
    box-shadow:0 20px 50px rgba(0,0,0,0.55); display:none; }
  body.save-open .cc-save{ display:block; }
  .cc-save-close{ display:inline-flex; align-items:center; justify-content:center; }
  .save-hint{ display:block; margin-top:8px; }
  .cc-tools{ gap:6px; flex-wrap:wrap; }
  .cc-tools .tbtn{ flex:1 1 42%; padding:8px 6px; font-size:12.5px; text-align:center; }
  #save-box{ min-height:54px; margin-top:8px; }
}
</style>
</head>

<div class="topbar">

<script>
/* ============================================================
   Core Clicker — single-file idle game (vanilla JS)
   ============================================================ */
(function(){
"use strict";

/* ---------- static data: tech trees, base costs, upgrade costs ---------- */
var DATA = {
  cpu:{ name:'CPU', role:'passive · cores/sec', base:15,
    tech:[ {n:'Intel 4004',v:1},{n:'IBM POWER4',v:2},{n:'Sun UltraSPARC T1 (Quad)',v:4},{n:'Sun UltraSPARC T1 (8-core)',v:8},
           {n:'AMD Opteron 6100 "Magny-Cours"',v:12},{n:'AMD Opteron 6200 "Interlagos"',v:16},{n:'AMD EPYC 7601',v:32},
           {n:'AMD EPYC 7742',v:64},{n:'Ampere Altra Max',v:128},{n:'Intel Xeon 6990E+ "Clearwater Forest"',v:288} ],
    up:[100,1000,10000,100000,1000000,10000000,100000000,1000000000,10000000000] },
  gpu:{ name:'GPU', role:'cores / click', base:250,
    tech:[ {n:'3dfx Voodoo Graphics (4MB)',v:1},{n:'3dfx Voodoo2 (8/12MB)',v:3},{n:'NVIDIA GeForce 256 (32MB)',v:10},
           {n:'NVIDIA GeForce 8800 GTX (768MB)',v:25},{n:'NVIDIA GTX 1080 (8GB)',v:75},{n:'NVIDIA RTX 2080 Ti (11GB)',v:200},
           {n:'NVIDIA RTX 4090 (24GB)',v:600},{n:'NVIDIA RTX 5090 (32GB)',v:1500} ],
    up:[1000,10000,100000,1000000,10000000,100000000,1000000000] },
  ram:{ name:'RAM', role:'efficiency multiplier', base:100,
    tech:[ {n:'Intel 1103 DRAM',v:0.01},{n:'DDR1 (200MHz)',v:0.02},{n:'DDR2 (400MHz)',v:0.03},
           {n:'DDR3 (800MHz)',v:0.04},{n:'DDR4 (2133MHz)',v:0.05},{n:'DDR5 (4800MHz)',v:0.075} ],
    up:[500,5000,50000,500000,5000000] },
  apu:{ name:'APU', role:'hybrid · passive + click', base:750,
    tech:[ {n:'AMD E-350 "Brazos"',p:0.5,c:0.5},{n:'AMD A8-3850 "Llano"',p:1,c:1},{n:'AMD Ryzen 5 2500U "Raven Ridge"',p:3,c:3},
           {n:'AMD Instinct MI300A',p:20,c:20},{n:'AMD Ryzen AI Max+ 395 "Strix Halo"',p:75,c:75} ],
    up:[5000,100000,5000000,250000000] },
  npu:{ name:'NPU', role:'auto-clicks / sec', base:2500,
    tech:[ {n:'Huawei Kirin 970',cps:0.25},{n:'Apple A11 Bionic Neural Engine',cps:0.5},{n:'Apple M1 Neural Engine',cps:1},
           {n:'AMD Ryzen 7040 "Phoenix"',cps:2},{n:'Qualcomm Snapdragon X Elite',cps:4},{n:'AMD Ryzen AI 300 "Strix Point"',cps:8},
           {n:'Intel Core Ultra 200V "Lunar Lake"',cps:12} ],
    up:[25000,500000,10000000,250000000,5000000000,100000000000] }
};
var ORDER = ['cpu','gpu','ram','apu','npu'];
var SAVE_VERSION = 1, LS_KEY = 'vcoCoreClicker', CK_KEY = 'vcoCoreClickerBak';

/* ---------- runtime state ---------- */
var cores=0, lifetime=0;
var owned = { cpu:0,gpu:0,ram:0,apu:0,npu:0 };
var level = { cpu:1,gpu:1,ram:1,apu:1,npu:1 };
var settings = {};
var lastSavedTs = Date.now();

/* ============================================================
   CORE ECONOMY MATH (pure functions — these are what Node checks)
   ============================================================ */
// Cost to buy the (owned+1)-th unit of a building.
function buildingCost(baseCost, owned){ return Math.ceil(baseCost * Math.pow(1.15, owned)); }

// Total economy given owned counts and the current per-unit tech values.
function computeStats(p){
  var cpuProduction = p.cpuOwned * p.cpuVal;            // CPUowned × currentCPUvalue
  var gpuClickBonus = p.gpuOwned * p.gpuVal;            // GPUowned × currentGPUvalue
  var apuPassive    = p.apuOwned * p.apuPassive;        // APUowned × currentAPUpassive
  var apuClickBonus = p.apuOwned * p.apuClick;          // APUowned × currentAPUclick
  var manualClickValue = 1 + gpuClickBonus + apuClickBonus;
  var npuProduction = p.npuOwned * p.npuCps * manualClickValue;
  var ramMultiplier = 1 + (p.ramOwned * p.ramBonus);
  var totalCPS = (cpuProduction + apuPassive + npuProduction) * ramMultiplier;
  var coresPerClick = manualClickValue * ramMultiplier;
  return { cpuProduction:cpuProduction, gpuClickBonus:gpuClickBonus, apuPassive:apuPassive, apuClickBonus:apuClickBonus,
           manualClickValue:manualClickValue, npuProduction:npuProduction, ramMultiplier:ramMultiplier,
           totalCPS:totalCPS, coresPerClick:coresPerClick };
}

// Compact number formatting: 1.2K / 3.4M / 5.6B / 7.8T ...
function fmt(n){
  if(!isFinite(n)) return '0';
  var neg = n < 0; n = Math.abs(n);
  if(n < 1000){ return (neg?'-':'') + (Math.floor(n)===n ? String(n) : n.toFixed(1)); }
  var units = ['K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
  var i = -1;
  while(n >= 1000 && i < units.length-1){ n /= 1000; i++; }
  var s = n.toFixed(2).replace(/\.?0+$/,'');
  return (neg?'-':'') + s + units[i];
}

/* current per-unit values from the active tech levels */
function curVals(){
  return {
    cpuVal: DATA.cpu.tech[level.cpu-1].v,
    gpuVal: DATA.gpu.tech[level.gpu-1].v,
    ramBonus: DATA.ram.tech[level.ram-1].v,
    apuP: DATA.apu.tech[level.apu-1].p,
    apuC: DATA.apu.tech[level.apu-1].c,
    npuCps: DATA.npu.tech[level.npu-1].cps
  };
}
function stats(){
  var v = curVals();
  var r = computeStats({ cpuOwned:owned.cpu, cpuVal:v.cpuVal, gpuOwned:owned.gpu, gpuVal:v.gpuVal,
    apuOwned:owned.apu, apuPassive:v.apuP, apuClick:v.apuC, npuOwned:owned.npu, npuCps:v.npuCps,
    ramOwned:owned.ram, ramBonus:v.ramBonus });
  r.v = v; return r;
}

/* ============================================================
   SAVE / LOAD / BACKUP / EXPORT-IMPORT
   ============================================================ */
function b64enc(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64dec(s){ return decodeURIComponent(escape(atob(s))); }
function buildSave(){
  return { version:SAVE_VERSION, cores:cores, lifetime:lifetime,
    owned:{cpu:owned.cpu,gpu:owned.gpu,ram:owned.ram,apu:owned.apu,npu:owned.npu},
    level:{cpu:level.cpu,gpu:level.gpu,ram:level.ram,apu:level.apu,npu:level.npu},
    costs:{cpu:buildingCost(DATA.cpu.base,owned.cpu),gpu:buildingCost(DATA.gpu.base,owned.gpu),ram:buildingCost(DATA.ram.base,owned.ram),apu:buildingCost(DATA.apu.base,owned.apu),npu:buildingCost(DATA.npu.base,owned.npu)},
    upgradeIndex:{cpu:level.cpu-1,gpu:level.gpu-1,ram:level.ram-1,apu:level.apu-1,npu:level.npu-1},
    settings:settings, lastSaved:Date.now() };
}
function setCookie(name,val){ try{ document.cookie = name+'='+val+'; max-age=31536000; path=/; SameSite=Lax'; }catch(e){} }
function getCookie(name){ var m=document.cookie.match(new RegExp('(?:^|; )'+name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'=([^;]*)')); return m?m[1]:null; }

function save(showToast){
  var st = buildSave(); lastSavedTs = st.lastSaved;
  var json = JSON.stringify(st);
  try{ localStorage.setItem(LS_KEY, json); }catch(e){}
  var b = b64enc(json);
  if(b.length < 3800){ setCookie(CK_KEY, b); }
  else { setCookie(CK_KEY, b64enc(JSON.stringify({ version:SAVE_VERSION, cores:cores, lifetime:lifetime, owned:st.owned, level:st.level, lastSaved:st.lastSaved }))); }
  if(showToast) toast('Game Saved');
  renderSavedAge();
}
function num(v,d){ v = Number(v); return isFinite(v) ? v : d; }
function validate(o){
  if(!o || typeof o !== 'object') return null;
  var s = { version:Math.floor(num(o.version,SAVE_VERSION)), cores:num(o.cores,0), lifetime:num(o.lifetime,0),
            owned:{}, level:{}, settings:(o.settings && typeof o.settings==='object')?o.settings:{}, lastSaved:num(o.lastSaved,Date.now()) };
  if(s.cores < 0) s.cores = 0;
  if(s.lifetime < 0) s.lifetime = 0;
  for(var i=0;i<ORDER.length;i++){
    var k = ORDER[i];
    var ow = Math.floor(num(o.owned && o.owned[k], 0)); if(ow < 0) ow = 0; s.owned[k] = ow;
    var maxL = DATA[k].tech.length;
    var lv = Math.floor(num(o.level && o.level[k], 1)); if(lv < 1) lv = 1; if(lv > maxL) lv = maxL; s.level[k] = lv;
  }
  if(s.lifetime < s.cores) s.lifetime = s.cores;
  return s;
}
function applyState(s){ cores=s.cores; lifetime=s.lifetime; owned=s.owned; level=s.level; settings=s.settings||{}; lastSavedTs=s.lastSaved; }
function freshState(){ cores=0; lifetime=0; owned={cpu:0,gpu:0,ram:0,apu:0,npu:0}; level={cpu:1,gpu:1,ram:1,apu:1,npu:1}; settings={}; lastSavedTs=Date.now(); }

function loadGame(){
  var loaded = null;
  try{ var j = localStorage.getItem(LS_KEY); if(j){ loaded = validate(JSON.parse(j)); } }catch(e){ loaded = null; }
  if(!loaded){ var c = getCookie(CK_KEY); if(c){ try{ loaded = validate(JSON.parse(b64dec(c))); }catch(e){ loaded = null; } } }
  if(loaded){ applyState(loaded); offlineProgress(loaded.lastSaved); }
  else { freshState(); }
}

/* ---------- offline progress (capped at 24h) ---------- */
function offlineProgress(savedTs){
  var elapsed = (Date.now() - savedTs) / 1000;
  if(!(elapsed > 0)) return;
  if(elapsed > 86400) elapsed = 86400;
  var cps = stats().totalCPS;
  var award = Math.floor(cps * elapsed);
  if(award > 0 && elapsed > 5){
    cores += award; lifetime += award;
    var w = document.getElementById('welcome');
    w.textContent = 'Welcome back. Your hardware generated ' + fmt(award) + ' cores while you were away.';
    w.hidden = false;
  }
}

/* ============================================================
   ACTIONS
   ============================================================ */
function manualClick(ev){
  var gain = stats().coresPerClick;
  cores += gain; lifetime += gain;
  spawnFloat('+' + fmt(gain));
  var g = document.getElementById('generate');
  g.classList.remove('pulse'); void g.offsetWidth; g.classList.add('pulse');
  renderStats();
}
function buy(k){
  var c = buildingCost(DATA[k].base, owned[k]);
  if(cores >= c){ cores -= c; owned[k] += 1; save(false); renderAll(); }
}
function upgrade(k){
  var maxL = DATA[k].tech.length;
  if(level[k] >= maxL) return;
  var c = DATA[k].up[level[k]-1];
  if(cores >= c){ cores -= c; level[k] += 1; save(false); renderAll(); }
}

/* ============================================================
   RENDERING
   ============================================================ */
var refs = {};
function buildCards(){
  var host = document.getElementById('buildings');
  host.innerHTML = '';
  ORDER.forEach(function(k){
    var d = DATA[k];
    var row = document.createElement('div'); row.className = 'srow';
    // Compact cookie-clicker style row: whole left button buys, small right button upgrades.
    row.innerHTML =
      '<button class="srow-buy" type="button" data-f="buy">' +
        '<span class="srow-info">' +
          '<span class="srow-name">'+d.name+'</span>' +
          '<span class="srow-tech" data-f="tech"></span>' +
          '<span class="srow-meta"><span class="c" data-f="cost"></span> cores · <span data-f="eff"></span></span>' +
        '</span>' +
        '<span class="srow-owned" data-f="owned">0</span>' +
      '</button>' +
      '<button class="srow-up" type="button" data-f="up">Upgrade <span class="c" data-f="upcost"></span><span class="srow-upname" data-f="upname"></span></button>';
    host.appendChild(row);
    refs[k] = { tech:q(row,'tech'), owned:q(row,'owned'), eff:q(row,'eff'), cost:q(row,'cost'),
                buy:q(row,'buy'), upname:q(row,'upname'), up:q(row,'up'), upcost:q(row,'upcost') };
    refs[k].buy.addEventListener('click', function(){ buy(k); });
    refs[k].up.addEventListener('click', function(){ upgrade(k); });
  });
}
function q(el,f){ return el.querySelector('[data-f="'+f+'"]'); }

function effectText(k, s){
  if(k==='cpu') return fmt(owned.cpu * s.v.cpuVal) + ' /sec';
  if(k==='gpu') return fmt(owned.gpu * s.v.gpuVal) + ' /click';
  if(k==='ram') return '×' + (1 + owned.ram * s.v.ramBonus).toFixed(2) + ' to all';
  if(k==='apu') return fmt(owned.apu * s.v.apuP) + ' /sec · ' + fmt(owned.apu * s.v.apuC) + ' /click';
  if(k==='npu') return fmt(owned.npu * s.v.npuCps) + ' clicks/sec';
  return '';
}
function renderStats(){
  var s = stats();
  document.getElementById('s-cores').textContent = fmt(cores);
  document.getElementById('s-life').textContent  = fmt(lifetime);
  document.getElementById('s-click').textContent = fmt(s.coresPerClick);
  document.getElementById('s-cps').textContent   = fmt(s.totalCPS);
  document.getElementById('s-ram').textContent   = s.ramMultiplier.toFixed(2) + '×';
  document.getElementById('gen-per').textContent = '+' + fmt(s.coresPerClick) + ' / click';
}
function renderBuildings(){
  var s = stats();
  ORDER.forEach(function(k){
    var r = refs[k], maxL = DATA[k].tech.length;
    r.tech.textContent = DATA[k].tech[level[k]-1].n;
    r.owned.textContent = owned[k];
    r.eff.textContent = effectText(k, s);
    var bc = buildingCost(DATA[k].base, owned[k]);
    r.cost.textContent = fmt(bc);
    r.buy.disabled = cores < bc;
    if(level[k] >= maxL){
      r.upname.textContent = 'Max tech reached';
      r.upcost.textContent = '';
      r.up.firstChild.textContent = 'MAX';
      r.up.disabled = true;
    } else {
      var uc = DATA[k].up[level[k]-1];
      r.upname.textContent = 'Next: ' + DATA[k].tech[level[k]].n;
      r.up.firstChild.textContent = 'Upgrade ';
      r.upcost.textContent = fmt(uc);
      r.up.disabled = cores < uc;
    }
  });
}
/* ----- middle column: physical buildings as little vector chips ----- */
var ICON = {
  cpu:'<svg viewBox="0 0 24 24" class="ficon" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/><rect x="9.5" y="9.5" width="5" height="5" rx="1" fill="currentColor" stroke="none" opacity=".5"/><path d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3"/></svg>',
  gpu:'<svg viewBox="0 0 24 24" class="ficon" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="7" width="18" height="10" rx="2"/><circle cx="8.5" cy="12" r="2.3"/><path d="M13 10.5h4M13 13.5h4M6 17v3M18 17v3"/></svg>',
  ram:'<svg viewBox="0 0 24 24" class="ficon" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="1"/><path d="M6 16v2.5M10 16v2.5M14 16v2.5M18 16v2.5"/><rect x="6" y="10.5" width="3" height="3" fill="currentColor" stroke="none" opacity=".5"/><rect x="11" y="10.5" width="3" height="3" fill="currentColor" stroke="none" opacity=".5"/></svg>',
  apu:'<svg viewBox="0 0 24 24" class="ficon" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M12 6v12M9 3v3M15 3v3M9 18v3M15 18v3"/><circle cx="9" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.3" fill="currentColor" stroke="none"/></svg>',
  npu:'<svg viewBox="0 0 24 24" class="ficon" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><circle cx="7" cy="8" r="1.7"/><circle cx="7" cy="16" r="1.7"/><circle cx="17" cy="12" r="1.7"/><path d="M8.6 8.6 15.4 11.3M8.6 15.4 15.4 12.7"/></svg>'
};
var FAC_CAP = 24; // max chips drawn per row; the count number stays authoritative
var facRefs = {};
function buildFactory(){
  var host = document.getElementById('factory'); if(!host) return; host.innerHTML='';
  ORDER.forEach(function(k){
    var band = document.createElement('div'); band.className='fac-band';
    band.innerHTML = '<div class="fac-head"><span class="fac-name">'+DATA[k].name+'</span><span class="fac-amt" data-ff="amt">0</span></div><div class="fac-icons" data-ff="icons"></div>';
    host.appendChild(band);
    facRefs[k] = { amt:band.querySelector('[data-ff="amt"]'), icons:band.querySelector('[data-ff="icons"]') };
  });
}
function renderFactory(){
  if(!facRefs.cpu) return;
  ORDER.forEach(function(k){
    facRefs[k].amt.textContent = owned[k];
    var html='';
    if(owned[k] === 0){ html = '<span class="fac-empty">None yet — buy one from the store</span>'; }
    else {
      var n = Math.min(owned[k], FAC_CAP);
      for(var i=0;i<n;i++){ html += ICON[k]; }
      if(owned[k] > FAC_CAP){ html += '<span class="fac-more">+'+fmt(owned[k]-FAC_CAP)+'</span>'; }
    }
    facRefs[k].icons.innerHTML = html;
  });
}
function renderSavedAge(){
  var secs = Math.max(0, Math.floor((Date.now() - lastSavedTs)/1000));
  var t;
  if(secs < 5) t = 'just now';
  else if(secs < 60) t = secs + 's ago';
  else if(secs < 3600) t = Math.floor(secs/60) + 'm ago';
  else t = Math.floor(secs/3600) + 'h ago';
  document.getElementById('s-saved').textContent = t;
}
function renderAll(){ renderStats(); renderBuildings(); renderFactory(); renderSavedAge(); }

/* floating +N text on the glass square */
function spawnFloat(text){
  var wrap = document.querySelector('.gen-wrap');
  var f = document.createElement('div'); f.className = 'floaty'; f.textContent = text;
  f.style.left = (45 + Math.random()*10) + '%';
  wrap.appendChild(f);
  setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 1000);
}

/* toast */
var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1600);
}

/* ============================================================
   SAVE PANEL BUTTONS
   ============================================================ */
function exportSave(){
  var code = b64enc(JSON.stringify(buildSave()));
  var box = document.getElementById('save-box'); box.value = code; box.focus(); box.select();
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(code).then(function(){ toast('Save code copied'); }, function(){ toast('Save code ready — copy it'); }); }
  else { toast('Save code ready — copy it'); }
}
function importSave(){
  var code = (document.getElementById('save-box').value || '').trim();
  if(!code){ toast('Paste a save code first'); return; }
  var obj;
  try{ obj = JSON.parse(b64dec(code)); }catch(e){ toast('Invalid save code'); return; }
  var s = validate(obj);
  if(!s){ toast('Invalid save data'); return; }
  applyState(s); save(false); renderAll(); toast('Save imported');
}
function hardReset(){
  if(!confirm('Hard reset: erase all progress and start over?')) return;
  freshState(); save(false); document.getElementById('welcome').hidden = true; renderAll(); toast('Progress reset');
}

/* ============================================================
   GAME LOOP (delta-time, frame-rate independent)
   ============================================================ */
var lastFrame = performance.now();
function loop(now){
  var dt = (now - lastFrame) / 1000;
  if(dt > 1) dt = 1;
  lastFrame = now;
  var cps = stats().totalCPS;
  if(cps > 0){ cores += cps * dt; lifetime += cps * dt; }
  renderStats();
  renderBuildings();
  requestAnimationFrame(loop);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  buildCards();
  buildFactory();
  loadGame();
  renderAll();
  document.getElementById('generate').addEventListener('click', manualClick);
  document.getElementById('btn-save').addEventListener('click', function(){ save(true); });
  document.getElementById('btn-export').addEventListener('click', exportSave);
  document.getElementById('btn-import').addEventListener('click', importSave);
  document.getElementById('btn-reset').addEventListener('click', hardReset);

  // offline "welcome back" message: floating toast — auto-dismiss after 5s, or tap to close
  var wel = document.getElementById('welcome');
  if(wel){
    wel.addEventListener('click', function(){ wel.hidden = true; });
    if(!wel.hidden){ setTimeout(function(){ wel.hidden = true; }, 5000); }
  }
  // collapsed save menu (mobile): header gear opens the panel as a popover
  var saveToggle = document.getElementById('save-toggle');
  var saveClose = document.getElementById('save-close');
  var saveBackdrop = document.getElementById('save-backdrop');
  function setSaveOpen(open){ document.body.classList.toggle('save-open', open); if(saveBackdrop) saveBackdrop.hidden = !open; }
  if(saveToggle) saveToggle.addEventListener('click', function(){ setSaveOpen(!document.body.classList.contains('save-open')); });
  if(saveClose) saveClose.addEventListener('click', function(){ setSaveOpen(false); });
  if(saveBackdrop) saveBackdrop.addEventListener('click', function(){ setSaveOpen(false); });

  setInterval(function(){ save(true); }, 5000);
  setInterval(renderSavedAge, 1000);
  window.addEventListener('beforeunload', function(){ save(false); });
  requestAnimationFrame(loop);
}
init();
})();
</script>
<script>
/* fullscreen toggle — real API + webkit fallback + iOS CSS pseudo-fullscreen */
(function(){
var btn=document.getElementById('fs-btn'); if(!btn){ return; }
var docEl=document.documentElement;
function supported(){ return !!(docEl.requestFullscreen || docEl.webkitRequestFullscreen); }
function fsEl(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
function setState(on){ document.body.classList.toggle('is-fs', on); btn.setAttribute('aria-pressed', on?'true':'false'); btn.title = on?'Exit fullscreen':'Fullscreen'; }
btn.addEventListener('click', function(){
  if(supported()){
    if(fsEl()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else { (docEl.requestFullscreen||docEl.webkitRequestFullscreen).call(docEl); }
  } else { var on=!document.body.classList.contains('pseudo-fs'); document.body.classList.toggle('pseudo-fs', on); setState(on); }
});
function onChange(){ if(supported()){ setState(!!fsEl()); } }
document.addEventListener('fullscreenchange', onChange);
document.addEventListener('webkitfullscreenchange', onChange);
})();
</script>
