<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<style>
html, body{ overscroll-behavior:none; }
body{ margin:0; min-height:100dvh; }
.site-header{ position:static; flex:0 0 auto; }
.header-inner{ padding:8px 0; }
.site-header .brand img{ height:40px; width:auto; object-fit:contain; }
.site-header .main-nav{ display:flex; align-items:center; gap:8px; }
@media (max-width:680px){ .site-header .header-inner{ flex-direction:row; gap:10px; padding:8px 0; } .site-header .brand img{ height:34px; } }
.fs-btn{ display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; padding:0; border:1px solid var(--line); border-radius:999px; background:var(--paper); color:var(--ink-soft); cursor:pointer; transition:color .18s ease, background .18s ease, border-color .18s ease; }
.fs-btn:hover{ color:var(--ink); border-color:var(--ink); background:var(--paper-2); }
.fs-btn svg{ width:18px; height:18px; display:block; }
.fs-btn .fs-exit{ display:none; }
body.is-fs .fs-btn .fs-enter{ display:none; }
body.is-fs .fs-btn .fs-exit{ display:inline-flex; }
body.pseudo-fs{ position:fixed; inset:0; width:100vw; height:100dvh; z-index:9999; overflow:auto; background:var(--paper); }
.play{ padding:6px 8px calc(20px + env(safe-area-inset-bottom)); }
.toolbar{ max-width:900px; margin:0 auto 8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.toolbar .grow{ flex:1; }
.toolbar .stat{ background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:5px 12px; text-align:center; min-width:58px; }
.toolbar .stat span{ display:block; font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-faint); }
.toolbar .stat strong{ font-family:var(--display); font-size:17px; font-weight:700; color:var(--ink); }
.diff{ display:inline-flex; padding:4px; gap:3px; background:var(--paper-2); border:1px solid var(--line); border-radius:999px; }
.diff button{ border:none; background:transparent; cursor:pointer; font-family:var(--body); font-size:13px; font-weight:600; color:var(--ink-soft); padding:6px 12px; border-radius:999px; }
.diff button.on{ background:var(--rust); color:#fff; }
.board-area{ max-width:900px; margin:0 auto; padding:0 2px; --cw:50px; --gap:4px; user-select:none; -webkit-user-select:none; }
.sbar{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.sbar .deals{ font-size:13px; color:var(--ink-soft); }
.tableau{ display:grid; grid-template-columns:repeat(10, var(--cw)); gap:var(--gap); justify-content:center; align-items:start; }
.tab-col{ position:relative; min-height:calc(var(--cw) * 1.42); }
.card, .slot{ width:var(--cw); height:calc(var(--cw) * 1.42); border-radius:calc(var(--cw) * 0.12); box-sizing:border-box; touch-action:manipulation; }
.slot{ border:1px dashed var(--line); background:rgba(34,29,22,0.03); }
.card{ position:relative; cursor:pointer; }
.card.up{ background:#fbf6ec; border:1px solid var(--line); box-shadow:0 1px 2px rgba(34,29,22,0.12); }
.card.down{ background:var(--rust); border:1px solid var(--rust-deep); background-image:repeating-linear-gradient(45deg, rgba(255,255,255,0.12) 0 3px, transparent 3px 8px); box-shadow:0 1px 2px rgba(34,29,22,0.12); cursor:pointer; }
.card.red{ color:#bd3b2a; }
.card.black{ color:#26201a; }
.card .cr{ position:absolute; top:2%; left:8%; font-family:var(--display); font-weight:700; font-size:calc(var(--cw) * 0.42); line-height:1; }
.card .cs{ position:absolute; top:36%; left:9%; font-size:calc(var(--cw) * 0.26); line-height:1; }
.card .cc{ position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); font-size:calc(var(--cw) * 0.58); }
.card.sel{ outline:2px solid var(--rust); outline-offset:-1px; box-shadow:0 0 0 3px rgba(180,80,46,0.28); z-index:5; }
.tab-col .card{ display:block; }
.win-overlay{ position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:rgba(244,238,226,0.86); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); padding:24px; }
.win-overlay[hidden]{ display:none; }
.win-card{ background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:32px 36px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; }
.win-card h2{ font-family:var(--display); font-size:clamp(32px,8vw,46px); margin:0; }
.win-card p{ color:var(--ink-soft); margin:0; font-size:16px; }
</style>
</head>
<body class="grain">
<header class="site-header">
<div class="wrap header-inner">
<a href="index.html" class="brand"><img src="images/valeandco.png" alt="Vale &amp; Co"></a>
<nav class="main-nav" aria-label="Main">
<a href="games.html">&larr; Back to Games</a>
<button id="fs-btn" class="fs-btn" type="button" title="Fullscreen" aria-label="Toggle fullscreen" aria-pressed="false">
<span class="fs-ic fs-enter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H3v5M16 3h5v5M16 21h5v-5M8 21H3v-5"/></svg></span>
<span class="fs-ic fs-exit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h5V3M21 8h-5V3M21 16h-5v5M3 16h5v5"/></svg></span>
</button>
</nav>
</div>
</header>
<main class="play">
<div class="toolbar">
<div class="diff" id="diff"><button type="button" data-d="1" class="on">1 suit</button><button type="button" data-d="2">2 suit</button><button type="button" data-d="4">4 suit</button></div>
<button type="button" class="btn btn-primary" id="deal">New game</button>
<div class="grow"></div>
<div class="stat"><span>Moves</span><strong id="moves">0</strong></div>
<div class="stat"><span>Stacks</span><strong id="stacks">0/8</strong></div>
<div class="stat"><span>Best</span><strong id="best">&mdash;</strong></div>
</div>
<div class="board-area" id="area">
<div class="sbar">
<div id="stock"></div>
<div class="deals" id="deals"></div>
</div>
<div class="tableau">
<div class="tab-col" id="t0"></div><div class="tab-col" id="t1"></div><div class="tab-col" id="t2"></div><div class="tab-col" id="t3"></div><div class="tab-col" id="t4"></div>
<div class="tab-col" id="t5"></div><div class="tab-col" id="t6"></div><div class="tab-col" id="t7"></div><div class="tab-col" id="t8"></div><div class="tab-col" id="t9"></div>
</div>
</div>
<div class="win-overlay" id="win" hidden>
<div class="win-card">
<h2>You win!</h2>
<p id="win-text">Moves: 0</p>
<button type="button" class="btn btn-primary" id="win-again">Play again</button>
</div>
</div>
</main>
<script>
(function(){
var SUITS=['♠','♥','♦','♣'];
function color(s){ return (s===1||s===2)?'red':'black'; }
function rankStr(r){ return r===1?'A':r===11?'J':r===12?'Q':r===13?'K':(''+r); }

/* ---- core rule helpers (mirrored in the Node check) ---- */
function validRun(pile, ci){ if(ci<0||ci>=pile.length||!pile[ci].up) return false; for(var i=ci;i<pile.length-1;i++){ var a=pile[i], b=pile[i+1]; if(!a.up||!b.up) return false; if(a.s!==b.s) return false; if(b.r!==a.r-1) return false; } return true; }
function canMoveTo(run, pile){ if(!pile.length) return true; var t=pile[pile.length-1]; return t.r===run[0].r+1; }
function isComplete(pile){ if(pile.length<13) return false; var st=pile.length-13; var s=pile[st].s; for(var k=0;k<13;k++){ var c=pile[st+k]; if(!c.up||c.s!==s||c.r!==13-k) return false; } return true; }
function buildSpiderDeck(difficulty){ var suits = difficulty===1?[0] : difficulty===2?[0,1] : [0,1,2,3]; var copies=8/suits.length; var d=[]; for(var cpy=0;cpy<copies;cpy++){ for(var si=0;si<suits.length;si++){ for(var r=1;r<=13;r++){ d.push({s:suits[si], r:r, up:false}); } } } return d; }

/* ---- state ---- */
var difficulty=1, tableau, stock, completed, sel, moves;
var BEST_KEY='vcoSpiderBest';
function loadBest(){ try{ var o=JSON.parse(localStorage.getItem(BEST_KEY)||'{}'); return (o&&typeof o==='object')?o:{}; }catch(e){ return {}; } }
var bestObj=loadBest();
function curBest(){ var v=bestObj[difficulty]; return (isFinite(v)&&v>0)?v:null; }

var area=document.getElementById('area');
var stockEl=document.getElementById('stock'), dealsEl=document.getElementById('deals');
var tabEls=[]; for(var i=0;i<10;i++){ tabEls.push(document.getElementById('t'+i)); }
var movesEl=document.getElementById('moves'), stacksEl=document.getElementById('stacks'), bestEl=document.getElementById('best');
var winEl=document.getElementById('win'), winText=document.getElementById('win-text');
var CW, UPOFF, DOWNOFF;

function shuffle(d){ for(var i=d.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=d[i]; d[i]=d[j]; d[j]=t; } return d; }

function deal(){
  var d=shuffle(buildSpiderDeck(difficulty));
  tableau=[[],[],[],[],[],[],[],[],[],[]];
  var idx=0;
  for(var col=0;col<10;col++){ var n=col<4?6:5; for(var k=0;k<n;k++){ var c=d[idx++]; tableau[col].push(c); } tableau[col][tableau[col].length-1].up=true; }
  stock=d.slice(idx); // 50 cards, face down
  completed=0; moves=0; sel=null; winEl.hidden=true; render();
}

function flipTop(pile){ if(pile.length){ var t=pile[pile.length-1]; if(!t.up) t.up=true; } }
function checkCompletions(){ var changed=true; while(changed){ changed=false; for(var i=0;i<10;i++){ if(isComplete(tableau[i])){ tableau[i].splice(tableau[i].length-13, 13); completed++; flipTop(tableau[i]); changed=true; } } } }

function afterMove(){
  if(completed===8){
    if(curBest()===null||moves<curBest()){ bestObj[difficulty]=moves; try{ localStorage.setItem(BEST_KEY, JSON.stringify(bestObj)); }catch(e){} }
    winText.textContent='Moves: '+moves+'  ·  '+(difficulty)+'-suit'+(curBest()!==null?'  ·  Best: '+curBest():'');
    winEl.hidden=false;
  }
  render();
}
function tryMove(di){
  if(!sel) return false;
  if(sel.i===di) return false;
  if(!validRun(tableau[sel.i], sel.c)) return false;
  var run=tableau[sel.i].slice(sel.c);
  if(!canMoveTo(run, tableau[di])) return false;
  tableau[sel.i].splice(sel.c); flipTop(tableau[sel.i]);
  for(var k=0;k<run.length;k++){ tableau[di].push(run[k]); }
  moves++; sel=null; checkCompletions(); afterMove(); return true;
}
function dealStock(){
  if(!stock.length) return;
  for(var i=0;i<10;i++){ if(!tableau[i].length){ flash('Fill every empty column before dealing'); return; } }
  for(var j=0;j<10;j++){ var c=stock.pop(); c.up=true; tableau[j].push(c); }
  moves++; sel=null; checkCompletions(); afterMove();
}
function flash(msg){ dealsEl.textContent=msg; setTimeout(render, 1400); }

var lastId=null, lastT=0;
function isDouble(id){ var now=Date.now(); var d=(id===lastId)&&(now-lastT<320); lastId=id; lastT=now; if(d){ lastId=null; } return d; }

stockEl.addEventListener('click', function(){ dealStock(); });
tabEls.forEach(function(col, i){ col.addEventListener('click', function(e){
  var cardEl=e.target.closest('.card');
  if(cardEl && cardEl.dataset.ci!==undefined){ clickTabCard(i, parseInt(cardEl.dataset.ci,10)); }
  else { if(sel){ if(!tryMove(i)){ sel=null; render(); } } }
}); });
function clickTabCard(i, ci){
  var card=tableau[i][ci];
  if(!card.up){ if(sel){ if(!tryMove(i)){ sel=null; render(); } } return; }
  if(sel){
    if(sel.i===i && sel.c===ci){ sel=null; render(); return; }
    if(tryMove(i)) return;
    if(validRun(tableau[i], ci)){ sel={i:i, c:ci}; render(); return; }
    sel=null; render(); return;
  }
  if(validRun(tableau[i], ci)){ sel={i:i, c:ci}; render(); }
}

document.getElementById('diff').addEventListener('click', function(e){
  var b=e.target.closest('button[data-d]'); if(!b) return;
  difficulty=parseInt(b.getAttribute('data-d'),10);
  var btns=this.querySelectorAll('button'); for(var k=0;k<btns.length;k++){ btns[k].classList.toggle('on', btns[k]===b); }
  deal();
});

function faceEl(card){ var el=document.createElement('div'); el.className='card up '+color(card.s); el.innerHTML='<span class="cr">'+rankStr(card.r)+'</span><span class="cs">'+SUITS[card.s]+'</span><span class="cc">'+SUITS[card.s]+'</span>'; return el; }
function backEl(){ var el=document.createElement('div'); el.className='card down'; return el; }

function render(){
  stockEl.innerHTML=''; if(stock.length){ stockEl.appendChild(backEl()); } else { stockEl.innerHTML='<div class="slot"></div>'; }
  dealsEl.textContent = stock.length ? (Math.round(stock.length/10)+' deals left  ·  tap stock to deal a row') : 'Stock empty';
  for(var i=0;i<10;i++){ var col=tabEls[i]; col.innerHTML=''; var pile=tableau[i];
    if(!pile.length){ col.innerHTML='<div class="slot"></div>'; continue; }
    for(var ci=0;ci<pile.length;ci++){ var card=pile[ci]; var el=card.up?faceEl(card):backEl(); el.dataset.ci=ci; if(ci>0){ el.style.marginTop=(card.up?UPOFF:DOWNOFF)+'px'; } if(sel&&sel.i===i&&ci>=sel.c){ el.classList.add('sel'); } col.appendChild(el); }
  }
  movesEl.textContent=moves; stacksEl.textContent=completed+'/8'; bestEl.textContent=(curBest()===null?'—':curBest());
}
function sizeBoard(){
  var W=area.clientWidth, gap=W<620?4:7;
  var cw=Math.floor((W - gap*9)/10); var maxcw=W<620?52:72; if(cw>maxcw){ cw=maxcw; } if(cw<26){ cw=26; }
  CW=cw; UPOFF=-Math.round(cw*0.94); DOWNOFF=-Math.round(cw*1.12);
  area.style.setProperty('--cw', cw+'px'); area.style.setProperty('--gap', gap+'px'); render();
}
window.addEventListener('resize', sizeBoard, { passive:true });
window.addEventListener('orientationchange', sizeBoard);
document.getElementById('deal').addEventListener('click', deal);
document.getElementById('win-again').addEventListener('click', deal);
deal(); sizeBoard();
})();
</script>
<script>
(function(){
var btn=document.getElementById('fs-btn'); if(!btn){ return; }
var docEl=document.documentElement;
function supported(){ return !!(docEl.requestFullscreen || docEl.webkitRequestFullscreen); }
function fsEl(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
function setState(on){ document.body.classList.toggle('is-fs', on); btn.setAttribute('aria-pressed', on?'true':'false'); btn.title = on?'Exit fullscreen':'Fullscreen'; }
btn.addEventListener('click', function(){
  if(supported()){
    if(fsEl()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else { (docEl.requestFullscreen||docEl.webkitRequestFullscreen).call(docEl); }
  } else { var on=!document.body.classList.contains('pseudo-fs'); document.body.classList.toggle('pseudo-fs', on); setState(on); }
});
function onChange(){ if(supported()){ setState(!!fsEl()); } }
document.addEventListener('fullscreenchange', onChange);
document.addEventListener('webkitfullscreenchange', onChange);
})();
</script>
</body>
</html>
